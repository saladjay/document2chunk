# Document2Chunk /parse-pdf 服务（与 mineru2doc :9300 并存）
# 部署：见 DEPLOY_112.md
services:
  document2chunk:
    container_name: document2chunk
    build:
      context: .
      dockerfile: Dockerfile.d2c
    image: document2chunk:latest
    restart: unless-stopped
    # 容器经 host.docker.internal 访问宿主 PaddleOCR :8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DOCUMENT2CHUNK_OCR_ENDPOINT=http://host.docker.internal:8000
      - DOCUMENT2CHUNK_OCR_TOKEN=${DOCUMENT2CHUNK_OCR_TOKEN}   # .env 或 -e 注入
      - DOCUMENT2CHUNK_OCR_MODEL=vl
      - DOCUMENT2CHUNK_OCR_TIMEOUT=300
    ports:
      - "9301:8000"   # 对外 9301（9300 被 mineru2doc 占用）
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
