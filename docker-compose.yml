services:
  mineru2doc:
    container_name: mineru2doc
    build: .
    image: mineru2doc:latest
    restart: unless-stopped
    # 容器经 host.docker.internal 访问宿主 MinerU :9030
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MINERU_BASE_URL=http://host.docker.internal:9030
      - MINERU_TIMEOUT=300
    ports:
      - "9300:8000"   # 对外 9300（部署前 ss -tln 复核，冲突则换）
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
